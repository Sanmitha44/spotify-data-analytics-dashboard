<!DOCTYPE html>
<html>
<head>
    <title>Spotify Data Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #020617;
            color: white;
            padding: 20px;
        }

        h1 {
            color: #22c55e;
            margin-top: 20px;
        }

        a {
            color: #22c55e;
            text-decoration: none;
        }

        .search-bar {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            gap: 10px;
        }

        .search-bar input {
            padding: 12px;
            width: 350px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .search-bar button {
            padding: 12px 18px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .cards {
            display: flex;
            justify-content: center;   /* ✅ centers the cards */
            gap: 20px;
            margin: 30px 0;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 220px;
            text-align: center;
        }

        .chart-box {
              margin-top: 40px;
              max-width: 700px;      /* 👈 medium size */
              margin-left: auto;
              margin-right: auto;   /* 👈 centers chart */
        }

    </style>
</head>

<body>

<!-- My Library -->
<a href="/library/">❤️ My Library</a>

<!-- Search -->
<div class="search-bar">
    <form method="GET" action="/search/" style="display:flex; gap:10px;">
        <input type="text" name="q" placeholder="Search song or artist...">
        <button type="submit">🔍</button>
    </form>
</div>

<h1>Spotify Data Analytics Dashboard 🎧</h1>

<!-- KPI TOOLBAR -->
<div class="cards">

  <div class="card">
    <h3>Total Tracks</h3>
    <p>{{ total_tracks }}</p>
  </div>

  <div class="card">
    <h3>Average Popularity</h3>
    <p>
      <a href="/popularity/">{{ avg_popularity }}</a>
    </p>
  </div>

  <div class="card">
    <h3>Top Genre</h3>
    <p>
      <a href="/genre/{{ top_genre }}/">{{ top_genre }}</a>
    </p>
  </div>

  <div class="card">
    <h3>Top Artist</h3>
    <p>
      <a href="/artist/{{ top_artist }}/">{{ top_artist }}</a>
    </p>
  </div>

</div>

<!-- CHART BELOW -->
<div class="chart-box">
    <h2>Top 10 Genres</h2>
    <canvas id="genreChart"></canvas>
</div>

<script>
    const genreLabels = {{ genre_labels|safe }};
    const genreValues = {{ genre_values|safe }};
    const adjustedValues = genreValues.map((v, i) => v - (i * 40));

    new Chart(document.getElementById('genreChart'), {
        type: 'bar',
        data: {
            labels: genreLabels,
            datasets: [{
                data: adjustedValues,
                backgroundColor: '#22c55e'
            }]
        },
        options: {
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>

</body>
</html>
