<!DOCTYPE html>
<html>
<head>
    <title>{{ genre }} Songs</title>
    <style>
        body {
            background: #020617;
            color: white;
            font-family: Arial;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #1e293b;
        }
        th {
            color: #22c55e;
            text-align: left;
        }
        a {
            color: #22c55e;
            text-decoration: none;
        }
    </style>
</head>
<body>

<h1>🎵 {{ genre }} Songs</h1>
<a href="/">⬅ Back to Dashboard</a>

<table>
    <tr>
        <th>Track</th>
        <th>Artist</th>
        <th>Popularity</th>
    </tr>

    {% for song in songs %}
    <tr>
        <td>{{ song.track_name }}</td>
        <td>{{ song.artists }}</td>
        <td>{{ song.popularity }}</td>
<td>
  <form method="POST" action="/add-favorite/">
    {% csrf_token %}
    <input type="hidden" name="track_name" value="{{ song.track_name }}">
    <input type="hidden" name="artist" value="{{ song.artists }}">
    <input type="hidden" name="popularity" value="{{ song.popularity }}">
    <button type="submit">❤️</button>
  </form>
</td>
<th>Like</th>
    </tr>
    {% endfor %}
</table>

</body>
</html>
